<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FieldStack ERP — Proycel</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#080b10;--bg2:#0d1119;--bg3:#131924;--bg4:#1a2030;--bg5:#202840;
  --wire:#1e2840;--wire2:#2a3854;--wire3:#364a6e;
  --chalk:#c8d8f0;--chalk2:#8a9dc0;--chalk3:#4a5a78;--chalk4:#2a3550;
  --volt:#00ff88;--volt2:#00cc6a;--volt3:#004422;--volt4:#001a0e;
  --arc:#3d9eff;--arc2:#1a7aff;--arc3:#0a2a5e;--arc4:#051428;
  --heat:#ff6b35;--heat3:#3d1500;
  --warn:#ffcc00;--warn3:#3d2e00;
  --err:#ff3355;--err3:#1a0008;
  --purple:#a78bfa;--purple3:#1a1432;
  --f:'Geist',system-ui,sans-serif;--fm:'Geist Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--f);color:var(--chalk);font-size:13px;overflow:hidden}
input,select,button,textarea{font-family:var(--f)}
::selection{background:var(--volt3);color:var(--volt)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--wire3);border-radius:2px}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900;padding:20px;
  background-image:radial-gradient(ellipse 80% 60% at 15% 85%,rgba(0,255,136,.06) 0%,transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 15%,rgba(61,158,255,.05) 0%,transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.007) 40px,rgba(255,255,255,.007) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.007) 40px,rgba(255,255,255,.007) 41px)}
.lbox{width:100%;max-width:400px}
.lmark{font-family:var(--fm);font-size:28px;font-weight:700;letter-spacing:-2px;margin-bottom:4px}
.lmark em{color:var(--volt);font-style:normal}
.ltag{font-size:10px;color:var(--chalk3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:28px}
.lcard{background:var(--bg2);border:1px solid var(--wire2);border-radius:14px;padding:26px;box-shadow:0 0 0 1px rgba(0,255,136,.04),0 24px 60px rgba(0,0,0,.6)}
.ltit{font-size:16px;font-weight:600;margin-bottom:3px}
.lsub{font-size:11px;color:var(--chalk3);margin-bottom:20px}
.llbl{font-size:10px;color:var(--chalk2);font-weight:600;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;font-family:var(--fm)}
.linp{width:100%;background:var(--bg3);border:1px solid var(--wire2);border-radius:8px;padding:11px 13px;color:var(--chalk);font-size:13px;outline:none;margin-bottom:13px;transition:border .15s}
.linp:focus{border-color:var(--volt3);box-shadow:0 0 0 3px rgba(0,255,136,.05)}
.lbtn{width:100%;padding:12px;background:var(--volt);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--fm);letter-spacing:.03em}
.lbtn:hover{background:var(--volt2);transform:translateY(-1px)}
.lbtn:disabled{background:var(--volt3);color:rgba(0,255,136,.3);cursor:not-allowed;transform:none}
.lerr{background:var(--err3);border:1px solid var(--err)33;border-radius:7px;padding:9px 12px;font-size:11px;color:var(--err);margin-bottom:12px;display:none;font-family:var(--fm)}
.lhint{font-size:11px;color:var(--chalk3);margin-top:14px;text-align:center;line-height:1.7}
.lhint strong{color:var(--chalk2);font-family:var(--fm)}
.lfooter{text-align:center;font-size:10px;color:var(--chalk4);margin-top:14px;font-family:var(--fm)}
.lfooter em{color:var(--volt);font-style:normal}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100%}

/* SIDEBAR */
.sb{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--wire);display:flex;flex-direction:column}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--wire)}
.sb-mark{font-family:var(--fm);font-size:15px;font-weight:700;letter-spacing:-1px}
.sb-mark em{color:var(--volt);font-style:normal}
.sb-ver{font-size:9px;color:var(--chalk4);margin-top:2px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--fm)}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-g{font-size:9px;color:var(--chalk4);padding:10px 10px 4px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;font-family:var(--fm)}
.sb-i{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:none;color:var(--chalk3);margin-bottom:1px;transition:all .15s;text-align:left;font-family:var(--f)}
.sb-i:hover{background:var(--bg3);color:var(--chalk)}
.sb-i.on{background:var(--volt4);color:var(--volt);border:1px solid var(--volt3)}
.sb-ic{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.sb-cnt{margin-left:auto;background:var(--err);color:#fff;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:700;font-family:var(--fm)}
.ob-tipo-t{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--arc4);color:var(--arc);font-family:var(--fm);font-weight:700;flex-shrink:0}
.ob-tipo-e{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--heat3);color:var(--heat);font-family:var(--fm);font-weight:700;flex-shrink:0}
.sb-user{padding:12px;border-top:1px solid var(--wire);display:flex;align-items:center;gap:8px}
.sb-av{width:30px;height:30px;border-radius:6px;background:var(--volt4);border:1px solid var(--volt3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--volt);flex-shrink:0;font-family:var(--fm)}
.sb-nm{font-size:11px;font-weight:600}
.sb-rl{font-size:10px;color:var(--chalk3);font-family:var(--fm)}
.sb-live{width:6px;height:6px;border-radius:50%;background:var(--volt);margin-left:auto;flex-shrink:0;box-shadow:0 0 8px var(--volt);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{background:var(--bg2);border-bottom:1px solid var(--wire);padding:0 20px;display:flex;align-items:center;gap:10px;min-height:50px;flex-shrink:0}
.tb-t{font-size:14px;font-weight:600;flex:1}
.tb-crumb{color:var(--chalk3);cursor:pointer;font-weight:400}.tb-crumb:hover{color:var(--chalk2)}
.tb-live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--chalk3);padding:4px 9px;background:var(--bg3);border:1px solid var(--wire);border-radius:5px;font-family:var(--fm)}
.tb-ld{width:5px;height:5px;border-radius:50%;background:var(--volt);animation:blink 2s infinite}
.content{flex:1;overflow-y:auto;padding:18px 20px}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:var(--f);letter-spacing:.01em}
.btn-v{background:var(--volt);color:#000}.btn-v:hover{background:var(--volt2)}
.btn-g{background:var(--bg3);color:var(--chalk);border:1px solid var(--wire2)}.btn-g:hover{background:var(--bg4)}
.btn-o{background:transparent;color:var(--chalk2);border:1px solid var(--wire)}.btn-o:hover{background:var(--bg3)}
.btn-b{background:var(--arc4);color:var(--arc);border:1px solid var(--arc)33}.btn-b:hover{background:var(--arc3)}
.btn-r{background:var(--err3);color:var(--err);border:1px solid var(--err)33}
.btn-h{background:var(--heat3);color:var(--heat);border:1px solid var(--heat)33}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.3;cursor:not-allowed}

.card{background:var(--bg2);border:1px solid var(--wire);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ctit{font-size:11px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--chalk2);text-transform:uppercase;letter-spacing:.07em;font-family:var(--fm)}

.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--wire);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.012) 0%,transparent 60%);pointer-events:none}
.kl{font-size:9px;color:var(--chalk3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm)}
.kv{font-size:22px;font-weight:700;font-family:var(--fm);letter-spacing:-1.5px;line-height:1}
.ks{font-size:10px;color:var(--chalk4);margin-top:3px;font-family:var(--fm)}

.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;font-family:var(--fm)}
.b-v{background:var(--volt4);color:var(--volt);border:1px solid var(--volt3)}
.b-b{background:var(--arc4);color:var(--arc);border:1px solid var(--arc)22}
.b-w{background:var(--warn3);color:var(--warn);border:1px solid var(--warn)22}
.b-r{background:var(--err3);color:var(--err);border:1px solid var(--err)22}
.b-h{background:var(--heat3);color:var(--heat);border:1px solid var(--heat)22}
.b-g{background:var(--bg4);color:var(--chalk2);border:1px solid var(--wire)}
.b-p{background:var(--purple3);color:var(--purple);border:1px solid var(--purple)22}

table{width:100%;border-collapse:collapse}
th{padding:7px 10px;text-align:left;color:var(--chalk3);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--wire);font-family:var(--fm)}
td{padding:8px 10px;border-bottom:1px solid var(--bg3);color:var(--chalk);font-size:12px;vertical-align:middle}
tr:hover td{background:var(--bg3)}
tr:last-child td{border-bottom:none}

.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:10px;color:var(--chalk2);font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-family:var(--fm)}
.fi,.fs{background:var(--bg3);border:1px solid var(--wire2);border-radius:7px;padding:8px 11px;color:var(--chalk);font-size:12px;outline:none;width:100%;transition:border .15s}
.fi:focus,.fs:focus{border-color:var(--volt3);box-shadow:0 0 0 2px rgba(0,255,136,.05)}
.fta{background:var(--bg3);border:1px solid var(--wire2);border-radius:7px;padding:8px 11px;color:var(--chalk);font-size:12px;outline:none;width:100%;resize:vertical;min-height:65px;transition:border .15s}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:6px;align-items:end}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--wire);margin-bottom:14px}
.tab{padding:9px 14px;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--chalk3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--fm);text-transform:uppercase;letter-spacing:.06em}
.tab.on{color:var(--volt);border-bottom-color:var(--volt)}

.pbw{display:flex;align-items:center;gap:7px}
.pb{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .6s}
.pp{font-size:10px;font-family:var(--fm);min-width:32px;font-weight:600}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--wire2);border-radius:12px;padding:22px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtit{font-size:14px;font-weight:700;font-family:var(--fm)}
.mx{background:var(--bg3);border:1px solid var(--wire);border-radius:6px;color:var(--chalk3);cursor:pointer;padding:3px 9px;font-size:15px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--wire)}

.al{border-radius:7px;padding:9px 12px;font-size:11px;line-height:1.5;margin-bottom:10px;font-family:var(--fm)}
.al-v{background:var(--volt4);border:1px solid var(--volt3);color:var(--volt)}
.al-b{background:var(--arc4);border:1px solid var(--arc)22;color:var(--arc)}
.al-w{background:var(--warn3);border:1px solid var(--warn)22;color:var(--warn)}
.al-r{background:var(--err3);border:1px solid var(--err)22;color:var(--err)}

/* IMPORTADOR */
.drop-zone{border:2px dashed var(--wire2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3);position:relative}
.drop-zone:hover,.drop-zone.over{border-color:var(--volt);background:var(--volt4)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* QUIEBRE ROWS */
.qrow{background:var(--bg3);border:1px solid var(--wire);border-radius:8px;padding:11px 13px;margin-bottom:7px;position:relative}
.qrow.cap{background:var(--bg4);border-color:var(--wire2)}
.qrow.sec{background:var(--bg3)}
.qrow.sub{padding-left:20px;border-left:2px solid var(--arc3)}
.qrow.mat{padding-left:34px;background:var(--bg);border-color:var(--bg3);border-left:2px solid var(--wire)}
.qrow-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.qrow-cod{font-family:var(--fm);font-size:11px;font-weight:700;color:var(--arc);min-width:50px}
.qrow-desc{font-size:12px;font-weight:600;flex:1}
.qrow-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--err);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px;opacity:.6}
.qrow-del:hover{background:var(--err3);opacity:1}
.comment-row{display:flex;align-items:center;gap:6px;margin-top:7px;padding:6px 9px;background:var(--bg4);border-radius:5px;border:1px solid var(--wire);border-left:2px solid var(--warn)}
.comment-row.empty{border-left-color:var(--wire);opacity:.6}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--wire2);border-radius:9px;padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:8px;pointer-events:all;max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,.6);animation:tin .2s ease;font-family:var(--fm)}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes tout{from{transform:none;opacity:1}to{transform:translateX(120%);opacity:0}}
.t-v{border-color:var(--volt3);color:var(--volt)}
.t-r{border-color:var(--err)33;color:var(--err)}
.t-w{border-color:var(--warn)33;color:var(--warn)}
.t-b{border-color:var(--arc)33;color:var(--arc)}

.spin{width:14px;height:14px;border:2px solid var(--wire2);border-top-color:var(--volt);border-radius:50%;animation:rot .6s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--chalk3);font-size:12px;font-family:var(--fm)}
.sep{font-size:9px;color:var(--chalk3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin:12px 0 8px;display:flex;align-items:center;gap:8px;font-family:var(--fm)}
.sep::after{content:'';flex:1;height:1px;background:var(--wire)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mono{font-family:var(--fm)}
.dim{color:var(--chalk3)}.muted{color:var(--chalk2)}

/* PROGRESS IMPORT */
.import-prog{background:var(--bg3);border-radius:8px;padding:14px;margin-top:10px}
.prog-bar-wrap{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:8px 0}
.prog-bar-fill{height:100%;background:var(--volt);border-radius:3px;transition:width .3s}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lmark">⚡ Field<em>Stack</em></div>
    <div class="ltag">ERP Control de Obra · Proycel</div>
    <div class="lcard">
      <div class="ltit">Acceso al sistema</div>
      <div class="lsub">Ingresá con tu cuenta o usá las credenciales demo</div>
      <div class="lerr" id="lerr"></div>
      <label class="llbl">Correo</label>
      <input class="linp" id="lemail" type="email" placeholder="usuario@proycel.cl" autocomplete="email"/>
      <label class="llbl">Contraseña</label>
      <input class="linp" id="lpass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="lbtn" id="lbtn" onclick="doLogin()">Entrar al sistema →</button>

    </div>
    <div class="lfooter"><em>FieldStack</em> · ERP interno Proycel · Telecomunicaciones y Eléctrica</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <div class="sb">
      <div class="sb-logo">
        <div class="sb-mark">⚡ Field<em>Stack</em></div>
        <div class="sb-ver">ERP Proycel · v1.1</div>
      </div>
      <nav class="sb-nav" id="sbnav"></nav>
      <div class="sb-user">
        <div class="sb-av" id="sbav">DM</div>
        <div><div class="sb-nm" id="sbnm">—</div><div class="sb-rl" id="sbrl">—</div></div>
        <div class="sb-live"></div>
      </div>
    </div>
    <div class="main">
      <div class="tb">
        <div class="tb-t" id="tbt">Dashboard</div>
        <div class="tb-live"><div class="tb-ld"></div><span id="synctxt">Demo activa</span></div>
        <div id="tbact"></div>
        <button class="btn btn-o btn-sm" onclick="doLogout()">Salir</button>
      </div>
      <div class="content" id="content">
        <div class="loading"><div class="spin"></div>Iniciando...</div>
      </div>
    </div>
  </div>
</div>
<div id="mroot"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const API = 'https://api.dvsolutions.cl';
let SESION = null;
let SEC = 'dashboard', OID = null, TAB = 'quiebres';

// Cache en memoria (se llena desde BD)
let DB = { obras: [], quiebres: {}, bodega: {}, pms: [], vcs: [], materiales: {} };

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const fmtF = s => s ? new Date(s+'T12:00').toLocaleDateString('es-CL') : '—';
const clamp = (n,lo,hi) => Math.min(Math.max(n,lo),hi);

async function api(path, opts={}) {
  const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
  if (opts.single) headers['Accept'] = 'application/vnd.pgrst.object+json';
  if (opts.return) headers['Prefer'] = `return=${opts.return}`;
  const res = await fetch(API + path, {
    method: opts.method || 'GET',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  if (res.status === 204 || opts.method === 'DELETE') return null;
  return res.json();
}

function pb(p) {
  const c = p>=85?'var(--err)':p>=65?'var(--warn)':'var(--volt)';
  return `<div class="pbw"><div class="pb"><div class="pf" style="width:${clamp(p,0,100)}%;background:${c}"></div></div><span class="pp mono" style="color:${c}">${p}%</span></div>`;
}
function bdg(e) {
  const M = {activa:['b-v','ACTIVA'],finalizada:['b-g','FIN'],borrador:['b-g','BORRADOR'],
    enviado:['b-b','ENVIADO'],en_proceso:['b-w','EN PROCESO'],entregado_parcial:['b-h','PARC.'],
    entregado_completo:['b-v','COMPLETO'],confirmado:['b-v','CONFIRMADO'],
    urgente:['b-r','URGENTE'],normal:['b-b','NORMAL']};
  const [c,l] = M[e]||['b-g',e?.toUpperCase()||'—'];
  return `<span class="badge ${c}">${l}</span>`;
}
function tipoBadge(tipo) {
  return tipo==='telco'
    ? `<span style="font-size:10px;padding:3px 7px;border-radius:4px;background:var(--arc4);color:var(--arc);font-family:var(--fm);font-weight:700">◉ TELCO</span>`
    : `<span style="font-size:10px;padding:3px 7px;border-radius:4px;background:var(--heat3);color:var(--heat);font-family:var(--fm);font-weight:700">⚡ ELEC</span>`;
}
function obraPct(id) {
  const qs = DB.quiebres[id]||[];
  const sub = qs.filter(q=>q.nivel>=3&&q.cant_objetivo>0);
  if (!sub.length) return 0;
  const tot = sub.reduce((a,q)=>a+Number(q.cant_objetivo),0);
  const ejec = sub.reduce((a,q)=>a+Number(q.cant_ejecutada),0);
  return tot>0 ? Math.round((ejec/tot)*100) : 0;
}
function toast(msg, type='v') {
  const t = document.createElement('div');
  t.className = `toast t-${type}`;
  const ico = {v:'✓',r:'⚠',w:'⚡',b:'ℹ'}[type]||'✓';
  t.innerHTML = `<span>${ico}</span><span>${msg}</span>`;
  $('toasts').appendChild(t);
  setTimeout(()=>{t.style.animation='tout .2s ease forwards';setTimeout(()=>t.remove(),200);},3500);
}
function setSync(txt) { const el=$('synctxt'); if(el) el.textContent=txt; }

// ═══════════════════════════════════════════════════════
// AUTH — Login real contra tabla usuarios
// ═══════════════════════════════════════════════════════
async function doLogin() {
  const em = $('lemail').value.trim().toLowerCase();
  const pw = $('lpass').value;
  if (!em||!pw) { showErr('Completá email y contraseña'); return; }
  $('lbtn').disabled = true;
  $('lbtn').textContent = 'Verificando...';
  hideErr();
  try {
    // Consultar usuario en BD
    const users = await api(`/usuarios?email=eq.${encodeURIComponent(em)}&activo=eq.true&select=id,email,nombre,rol,obra_asignada,password`);
    if (!users || users.length === 0) {
      showErr('Usuario no encontrado o inactivo');
      $('lbtn').disabled=false; $('lbtn').textContent='Entrar al sistema →';
      return;
    }
    const u = users[0];
    // Validar contraseña
    if (u.password && u.password !== pw) {
      showErr("Contraseña incorrecta");
      $("lbtn").disabled=false; $("lbtn").textContent="Entrar al sistema →";
      return;
    }
    SESION = { id: u.id, email: u.email, nombre: u.nombre, inicial: u.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(), rol: u.rol, obra_asignada: u.obra_asignada };
    $('login').style.display = 'none';
    $('app').style.display = 'block';
    $('sbav').textContent = SESION.inicial;
    $('sbnm').textContent = SESION.nombre;
    $('sbrl').textContent = SESION.rol.replace(/_/g,' ');
    await loadData();
    nav('dashboard');
  } catch(e) {
    showErr('Error de conexión: ' + e.message);
    $('lbtn').disabled=false; $('lbtn').textContent='Entrar al sistema →';
  }
}
function doLogout() {
  SESION = null;
  DB = { obras:[], quiebres:{}, bodega:{}, pms:[], vcs:[], materiales:{} };
  $('app').style.display = 'none';
  $('login').style.display = 'flex';
  $('lbtn').disabled = false; $('lbtn').textContent = 'Entrar al sistema →';
  $('lpass').value = '';
}
function showErr(m) { const e=$('lerr'); e.textContent=m; e.style.display='block'; }
function hideErr() { $('lerr').style.display='none'; }

// ═══════════════════════════════════════════════════════
// CARGA DE DATOS DESDE BD
// ═══════════════════════════════════════════════════════
async function loadData() {
  setSync('Cargando...');
  try {
    // Obras
    let obrasUrl = '/obras?select=*&order=id';
    if (SESION.rol === 'encargado' && SESION.obra_asignada) {
      obrasUrl = `/obras?id=eq.${SESION.obra_asignada}&select=*`;
    }
    DB.obras = await api(obrasUrl) || [];
    const obraIds = DB.obras.map(o => o.id);

    // Quiebres — una sola consulta para todas las obras
    const obraFilter = obraIds.map(id => `obra_id=eq.${id}`).join(',');
    const allQs = await api(`/quiebres?or=(${obraFilter})&order=obra_id,codigo&limit=2000`) || [];

    // Materiales — una sola consulta
    const allMats = await api(`/materiales?select=*&limit=5000`) || [];
    const matsByQ = {};
    for (const m of allMats) {
      if (!matsByQ[m.quiebre_id]) matsByQ[m.quiebre_id] = [];
      matsByQ[m.quiebre_id].push(m);
    }

    // Extras — una sola consulta
    const allExtras = await api(`/extras?select=*&limit=2000`) || [];
    const extrasByQ = {};
    for (const e of allExtras) {
      if (!extrasByQ[e.quiebre_id]) extrasByQ[e.quiebre_id] = [];
      extrasByQ[e.quiebre_id].push(e);
    }

    // Agrupar quiebres por obra
    for (const o of DB.obras) {
      DB.quiebres[o.id] = allQs
        .filter(q => q.obra_id === o.id)
        .map(q => ({
          ...q,
          materiales: matsByQ[q.id] || [],
          extras: extrasByQ[q.id] || [],
          can_obj: Number(q.cant_objetivo)||0,
          can_ejec: Number(q.cant_ejecutada)||0,
          dias_sin_mov: q.dias_sin_movimiento||0,
          desc: q.descripcion
        }));
    }

    // PMs con items — dos consultas
    let pmsUrl = SESION.rol==='encargado' && SESION.obra_asignada
      ? `/pms?obra_id=eq.${SESION.obra_asignada}&order=created_at.desc`
      : '/pms?order=created_at.desc&limit=500';
    const pmsRaw = await api(pmsUrl) || [];
    const allPmItems = pmsRaw.length > 0
      ? await api(`/pm_items?select=*&limit=5000`) || []
      : [];
    const itemsByPm = {};
    for (const it of allPmItems) {
      if (!itemsByPm[it.pm_id]) itemsByPm[it.pm_id] = [];
      itemsByPm[it.pm_id].push(it);
    }
    DB.pms = pmsRaw.map(pm => ({ ...pm, items: itemsByPm[pm.id] || [] }));

    // VCs con items y distribuciones — tres consultas
    let vcsUrl = SESION.rol==='encargado' && SESION.obra_asignada
      ? `/vcs?obra_id=eq.${SESION.obra_asignada}&order=created_at.desc`
      : '/vcs?order=created_at.desc&limit=500';
    const vcsRaw = await api(vcsUrl) || [];
    const allVcItems = vcsRaw.length > 0
      ? await api(`/vc_items?select=*&limit=5000`) || []
      : [];
    const allVcDists = allVcItems.length > 0
      ? await api(`/vc_distribuciones?select=*&limit=10000`) || []
      : [];
    const distsByItem = {};
    for (const d of allVcDists) {
      if (!distsByItem[d.vc_item_id]) distsByItem[d.vc_item_id] = [];
      distsByItem[d.vc_item_id].push(d);
    }
    const vcItemsByVc = {};
    for (const vi of allVcItems) {
      vi.dists = distsByItem[vi.vc_id] || [];
      if (!vcItemsByVc[vi.vc_id]) vcItemsByVc[vi.vc_id] = [];
      vcItemsByVc[vi.vc_id].push(vi);
    }
    DB.vcs = vcsRaw.map(vc => ({ ...vc, items: vcItemsByVc[vc.id] || [] }));

    // Bodega — una consulta
    const allBod = await api(`/bodega?select=*&limit=5000`) || [];
    for (const o of DB.obras) DB.bodega[o.id] = {};
    for (const b of allBod) {
      if (DB.bodega[b.obra_id]) DB.bodega[b.obra_id][b.material_codigo||b.id] = b;
    }

    setSync('✓ Sincronizado');
    renderNav();
  } catch(e) {
    setSync('⚠ Error BD');
    console.error('loadData error:', e);
    toast('Error cargando datos: ' + e.message, 'r');
  }
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function buildNav() {
  const items = [{g:'Principal'},{id:'dashboard',i:'⊞',l:'Dashboard'}];
  const telco = DB.obras.filter(o=>o.tipo==='telco');
  const elec = DB.obras.filter(o=>o.tipo==='electrica');
  if (telco.length) {
    items.push({g:'Telecomunicaciones'});
    telco.forEach(o=>items.push({id:'obra:'+o.id,i:'◎',l:o.id,tipo:'t',sub:o.nombre}));
  }
  if (elec.length) {
    items.push({g:'Eléctrica'});
    elec.forEach(o=>items.push({id:'obra:'+o.id,i:'◎',l:o.id,tipo:'e',sub:o.nombre}));
  }
  items.push({g:'Operaciones'});
  items.push({id:'pms',i:'↗',l:'Pedidos (PM)',cnt:()=>DB.pms.filter(p=>p.estado==='enviado').length});
  items.push({id:'vcs',i:'✓',l:'Vales (VC)'});
  if (SESION?.rol==='admin'||SESION?.rol==='jefe_area') {
    items.push({g:'Sistema'});
    items.push({id:'catalogo',i:'◈',l:'Catálogo'});
    items.push({id:'usuarios',i:'👤',l:'Usuarios'});
  }
  return items;
}

function renderNav() {
  const cur = OID?'obra:'+OID:SEC;
  const items = buildNav();
  $('sbnav').innerHTML = items.map(n=>{
    if (n.g) return `<div class="sb-g">${n.g}</div>`;
    const cnt = n.cnt?n.cnt():0;
    const tipoBadge = n.tipo?`<span class="ob-tipo-${n.tipo}">${n.tipo==='t'?'TELCO':'ELEC'}</span>`:'';
    return `<button class="sb-i${cur===n.id?' on':''}" onclick="nav('${n.id}')">
      <span class="sb-ic">${n.i}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.l}</span>
      ${tipoBadge}
      ${cnt>0?`<span class="sb-cnt">${cnt}</span>`:''}
    </button>`;
  }).join('');
}

function nav(id) {
  if (id.startsWith('obra:')) { OID=id.replace('obra:',''); SEC='obra-detalle'; }
  else { SEC=id; OID=null; }
  TAB='quiebres'; renderNav(); render();
}

    <button class="btn btn-g btn-sm" onclick="mPM()">+ PM</button>

// ═══════════════════════════════════════════════════════
// RENDER: QUIEBRES
// ═══════════════════════════════════════════════════════
function rQuiebres(qs, o) {
  return qs.map((q)=>{
    const pct = q.can_obj>0?Math.round((q.can_ejec/q.can_obj)*100):0;
    const sinMov = q.dias_sin_mov>=15;
    const tieneExtras = q.extras&&q.extras.length>0;
    const tieneMats = q.materiales&&q.materiales.length>0;
    const nivelClass = q.nivel===1?'cap':q.nivel===2?'sec':'sub';
    return `<div class="qrow ${nivelClass}" style="${sinMov?'border-color:var(--heat)33':''}">
      <div class="qrow-hdr">
        <span class="qrow-cod">${q.codigo}</span>
        <span style="font-size:${q.nivel<=2?13:12}px;font-weight:${q.nivel<=2?700:600};flex:1">${q.desc||q.descripcion}</span>
        ${q.unidad?`<span class="mono" style="font-size:10px;color:var(--chalk3)">${q.can_ejec}/${q.can_obj} ${q.unidad}</span>`:''}
        ${sinMov?`<span class="badge b-h">⏱ ${q.dias_sin_mov}d</span>`:''}
        ${tieneExtras?`<span class="badge b-b">+${q.extras.length}</span>`:''}
      </div>
      ${q.can_obj>0?`<div style="margin-bottom:8px">${pb(pct)}</div>`:''}
      ${tieneMats&&q.nivel>=3?`
        <div style="margin-bottom:8px">
          <div style="font-size:9px;color:var(--chalk3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--fm);margin-bottom:4px">Materiales</div>
          ${q.materiales.slice(0,3).map(m=>`
            <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--bg4)">
              <span class="mono" style="color:var(--chalk3);font-size:10px;min-width:80px">${m.codigo||m.cod}</span>
              <span style="flex:1;color:var(--chalk2);margin:0 8px">${m.descripcion||m.desc}</span>
              <span class="mono" style="color:var(--arc)">${m.cant_objetivo||m.can_obj} ${m.unidad}</span>
            </div>`).join('')}
          ${q.materiales.length>3?`<div style="font-size:10px;color:var(--chalk3);margin-top:3px;font-family:var(--fm)">+ ${q.materiales.length-3} materiales más</div>`:''}
        </div>`:''}
      <div class="comment-row${!q.comentario?' empty':''}">

async function editComent(qid, val) {
  try {
    await api(`/quiebres?id=eq.${qid}`, { method:'PATCH', body:{comentario:val}, return:'minimal' });
    const q = Object.values(DB.quiebres).flat().find(x=>x.id===qid);
    if (q) q.comentario = val;
    toast('Comentario guardado');
  } catch(e) { toast('Error guardando comentario','r'); }
}
async function removeExtra(qid, idx) {
  const q = Object.values(DB.quiebres).flat().find(x=>x.id===qid);
  if (!q) return;
  const ex = q.extras[idx];
  if (!ex) return;
  try {
    await api(`/extras?id=eq.${ex.id}`, { method:'DELETE' });
    q.extras.splice(idx,1);
    render();
    toast('Ítem eliminado');
  } catch(e) { toast('Error eliminando ítem','r'); }
}

function rBodega(bod) {

  return `<div class="card" style="padding:0;overflow:hidden"><table>

      return `<tr>

// MODAL: PM
let PM_ITEMS = [{cod:'',quiebre:'',sol:'',unidad:'u',obs:''}];
function mPM() {
  const o = DB.obras.find(x=>x.id===OID);
  PM_ITEMS = [{cod:'',quiebre:'',sol:'',unidad:'u',obs:''}];
  const qs = DB.quiebres[OID]||[];

  showM(`Nuevo PM — ${o?.id}`,`
    <div class="fr2">
      <div class="fg"><label class="fl">Urgencia</label>
        <select class="fs" id="pm-urg"><option value="normal">Normal</option><option value="urgente">Urgente</option></select></div>
      <div class="fg"><label class="fl">Solicitante</label><input class="fi" value="${o?.encargado||''}" disabled/></div>
    </div>

function rPMItems(mats,qs) {
  mats=mats||[]; qs=qs||[];
  return PM_ITEMS.map((_,i)=>`
    <div style="background:var(--bg3);border:1px solid var(--wire);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative">
      <div style="font-size:9px;color:var(--chalk3);font-family:var(--fm);font-weight:600;text-transform:uppercase;margin-bottom:8px">Ítem ${i+1}</div>
      ${PM_ITEMS.length>1?`<button onclick="rmPMItem(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--err);cursor:pointer;font-size:13px;padding:2px 6px">✕</button>`:''}
      <div class="fr2" style="margin-bottom:8px">
        <div class="fg" style="margin:0"><label class="fl">Material</label>
          <select class="fs" id="pm-sel-${i}" onchange="onPMSel(${i})">
            <option value="">Seleccioná del catálogo...</option>
            ${mats.map(m=>`<option value="${m.codigo||m.cod}|${m.unidad}">${m.codigo||m.cod} — ${m.descripcion||m.desc}</option>`).join('')}
          </select></div>
        <div class="fg" style="margin:0"><label class="fl">Quiebre destino</label>
          <select class="fs" id="pm-q-${i}">
            <option value="">Seleccioná quiebre...</option>
            ${qs.filter(q=>q.nivel>=2).map(q=>`<option value="${q.codigo}">${q.codigo} — ${(q.descripcion||q.desc||'').substring(0,40)}</option>`).join('')}
          </select></div>
      </div>
      <div class="fr3">
        <div class="fg" style="margin:0"><label class="fl">Cantidad</label><input class="fi" id="pm-qty-${i}" type="number" placeholder="0"/></div>
        <div class="fg" style="margin:0"><label class="fl">Unidad</label><input class="fi" id="pm-uni-${i}" placeholder="uni/mt"/></div>
        <div class="fg" style="margin:0"><label class="fl">Observación</label><input class="fi" id="pm-obs-${i}" placeholder="Opcional"/></div>
      </div>
    </div>`).join('');
}
function onPMSel(i) { const val=$(`pm-sel-${i}`).value; if(!val)return; const[,uni]=val.split('|'); if($(`pm-uni-${i}`))$(`pm-uni-${i}`).value=uni||'u'; }
function addPMItem() {
  PM_ITEMS.push({cod:'',quiebre:'',sol:'',unidad:'u',obs:''});
  const qs=DB.quiebres[OID]||[];
  const mats=[...new Map(qs.flatMap(q=>q.materiales||[]).map(m=>[(m.codigo||m.cod),m])).values()];
  $('pmwrap').innerHTML=rPMItems(mats,qs);
}
function rmPMItem(i) {
  PM_ITEMS.splice(i,1);
  const qs=DB.quiebres[OID]||[];
  const mats=[...new Map(qs.flatMap(q=>q.materiales||[]).map(m=>[(m.codigo||m.cod),m])).values()];
  $('pmwrap').innerHTML=rPMItems(mats,qs);
}
async function savePM(estado) {
  const o = DB.obras.find(x=>x.id===OID);
  const items = PM_ITEMS.map((_,i)=>{
    const selVal = $(`pm-sel-${i}`)?.value||'';
    const [cod] = (selVal||'').split('|');
    const qs = DB.quiebres[OID]||[];
    const mat = qs.flatMap(q=>q.materiales||[]).find(m=>(m.codigo||m.cod)===cod);
    return {codigo:cod||'',descripcion:mat?.descripcion||mat?.desc||cod,
      quiebre_codigo:$(`pm-q-${i}`)?.value||'',
      cantidad_solicitada:parseFloat($(`pm-qty-${i}`)?.value||0)||0,
      unidad:$(`pm-uni-${i}`)?.value||mat?.unidad||'u',
      observacion:$(`pm-obs-${i}`)?.value||'',
      cantidad_entregada:0,saldo:0};
  }).filter(it=>it.codigo&&it.cantidad_solicitada>0);
  if (!items.length) { toast('Completá al menos un ítem','r'); return; }
  const pmId = `PM-${o.id}-${String(Date.now()).slice(-4)}`;
  const pm = {id:pmId,obra_id:o.id,fecha:new Date().toISOString().split('T')[0],
    estado,urgencia:$('pm-urg')?.value||'normal',solicitante:o.encargado};
  try {
    await api('/pms', { method:'POST', body:pm, return:'minimal' });
    for (const it of items) {
      await api('/pm_items', { method:'POST', body:{...it, pm_id:pmId, id:'pmi_'+Date.now()+'_'+Math.random().toString(36).slice(2)}, return:'minimal' });
    }
    pm.items = items;
    DB.pms.unshift(pm);
    closeM(); render(); toast(`PM ${estado==='enviado'?'enviado':'guardado'} con ${items.length} ítem(s) ✓`);
  } catch(e) { toast('Error creando PM: '+e.message,'r'); }
}

// MODAL: VC
let VC_S = {guia:'',cod:'',saldo:0,unidad:'u',dists:[{quiebre:'',cantidad:'',obs:''}]};
function mVC() {
  const o = DB.obras.find(x=>x.id===OID);
  const guias = DB.pms.filter(p=>p.obra_id===OID).flatMap(pm=>(pm.items||[]).filter(i=>(i.guia_numero||i.guia)&&(i.saldo||0)>0).map(i=>({key:`${i.guia_numero||i.guia}|${i.codigo||i.cod}`,guia:i.guia_numero||i.guia,desc:i.descripcion||i.desc,cod:i.codigo||i.cod,saldo:i.saldo,unidad:i.unidad})));
  VC_S = {guia:'',cod:'',saldo:0,unidad:'u',dists:[{quiebre:'',cantidad:'',obs:''}]};
  showM(`Nuevo Vale de Consumo — ${o?.id}`,`
    <div class="fr2">
      <div class="fg"><label class="fl">Fecha</label><input class="fi" id="vcf" type="date" value="${new Date().toISOString().split('T')[0]}"/></div>
      <div class="fg"><label class="fl">Encargado</label><input class="fi" value="${o?.encargado||''}" disabled/></div>
    </div>
    <div class="fg"><label class="fl">Guía disponible</label>
      <select class="fs" id="vcg" onchange="onVCGuia(this.value)">
        <option value="">Seleccioná una guía con saldo...</option>
        ${guias.map(g=>`<option value="${g.key}">${g.guia} — ${g.desc} · saldo: ${g.saldo} ${g.unidad}</option>`).join('')}
        ${!guias.length?'<option disabled>Sin guías con saldo — creá un PM y cargá una guía primero</option>':''}
      </select></div>
    <div id="vcbody" style="display:none">
      <div id="vcsaldo" class="al al-b" style="margin-bottom:10px"></div>
      <div class="sep">Distribuir por quiebres</div>
      <div id="vcdists"></div>
      <button class="btn btn-g btn-sm" style="margin-bottom:12px" onclick="addVCD()">+ Agregar quiebre</button>
    </div>
    <div class="mact">
      <button class="btn btn-o" onclick="closeM()">Cancelar</button>
      <button class="btn btn-v" id="vcbtn" disabled onclick="saveVC()">✓ Confirmar VC</button>
    </div>`,620);
}
function rVCDists() {
  const qs = DB.quiebres[OID]||[];
  return VC_S.dists.map((d,i)=>`
    <div style="background:var(--bg3);border:1px solid var(--wire);border-radius:8px;padding:10px 12px;margin-bottom:6px;position:relative">
      ${VC_S.dists.length>1?`<button onclick="rmVCD(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--err);cursor:pointer;font-size:13px;padding:2px 6px">✕</button>`:''}
      <div class="fr3">
        <div class="fg" style="margin:0"><label class="fl">Quiebre</label>
          <select class="fs" id="vd-q-${i}" onchange="VC_S.dists[${i}].quiebre=this.value;updVCS()">
            <option value="">Seleccioná...</option>
            ${qs.filter(q=>q.nivel>=2).map(q=>`<option value="${q.codigo}" ${d.quiebre===q.codigo?'selected':''}>${q.codigo} — ${(q.descripcion||q.desc||'').substring(0,30)}</option>`).join('')}
          </select></div>
        <div class="fg" style="margin:0"><label class="fl">Cantidad (${VC_S.unidad})</label>
          <input class="fi" id="vd-c-${i}" type="number" placeholder="0" value="${d.cantidad}" oninput="VC_S.dists[${i}].cantidad=this.value;updVCS()"/></div>
        <div class="fg" style="margin:0"><label class="fl">Observación</label>
          <input class="fi" id="vd-o-${i}" placeholder="Opcional" value="${d.obs||''}" oninput="VC_S.dists[${i}].obs=this.value"/></div>
      </div>
    </div>`).join('');
}
function onVCGuia(val) {
  const b=$('vcbody'); if(!val){b.style.display='none';return;}
  const [guia,cod]=val.split('|');
  const pm=DB.pms.find(p=>p.obra_id===OID&&(p.items||[]).some(i=>(i.guia_numero||i.guia)===guia&&(i.codigo||i.cod)===cod));
  const it=pm?.items?.find(i=>(i.guia_numero||i.guia)===guia&&(i.codigo||i.cod)===cod);
  if(!it){b.style.display='none';return;}
  VC_S={guia,cod,saldo:it.saldo,unidad:it.unidad,dists:[{quiebre:'',cantidad:'',obs:''}]};
  b.style.display='block'; $('vcdists').innerHTML=rVCDists(); updVCS();
}
function updVCS() {
  const tot=VC_S.dists.reduce((a,d)=>a+(parseFloat(d.cantidad)||0),0);
  const rest=VC_S.saldo-tot; const ok=tot>0&&rest>=0;
  const info=$('vcsaldo');
  if(info)info.innerHTML=`Saldo guía <strong>${VC_S.guia}</strong>: <strong>${VC_S.saldo} ${VC_S.unidad}</strong> · Distribuido: <strong>${tot}</strong> · Restante: <strong style="color:${rest<0?'var(--err)':rest===0?'var(--volt)':'var(--warn)'}">${rest} ${VC_S.unidad}</strong>`;
  const btn=$('vcbtn'); if(btn)btn.disabled=!ok;
}
function addVCD(){VC_S.dists.push({quiebre:'',cantidad:'',obs:''});$('vcdists').innerHTML=rVCDists();updVCS();}
function rmVCD(i){VC_S.dists.splice(i,1);$('vcdists').innerHTML=rVCDists();updVCS();}
async function saveVC() {
  const o = DB.obras.find(x=>x.id===OID);
  const dists = VC_S.dists.map((_,i)=>{
    const qSel=$(`vd-q-${i}`);
    return {quiebre_codigo:$(`vd-q-${i}`)?.value||VC_S.dists[i].quiebre,
      descripcion:qSel?.options[qSel?.selectedIndex]?.text||'',
      cantidad:parseFloat($(`vd-c-${i}`)?.value||0)||0,
      observacion:$(`vd-o-${i}`)?.value||''};
  }).filter(d=>d.quiebre_codigo&&d.cantidad>0);
  if (!dists.length) { toast('Completá al menos una distribución','r'); return; }
  const tot = dists.reduce((a,d)=>a+d.cantidad,0);
  const vcId = `VC-${OID}-${String(Date.now()).slice(-4)}`;
  const vc = {id:vcId,obra_id:OID,fecha:$('vcf').value,encargado:o.encargado,estado:'confirmado'};
  try {
    await api('/vcs', { method:'POST', body:vc, return:'minimal' });
    const vcItem = {id:'vci_'+Date.now(),vc_id:vcId,codigo:VC_S.cod,descripcion:VC_S.cod,
      guia_numero:VC_S.guia,unidad:VC_S.unidad,cantidad_total:tot};
    await api('/vc_items', { method:'POST', body:vcItem, return:'minimal' });
    for (const d of dists) {
      await api('/vc_distribuciones', { method:'POST', body:{...d,id:'vcd_'+Date.now()+'_'+Math.random().toString(36).slice(2),vc_item_id:vcItem.id}, return:'minimal' });
    }
    vcItem.dists = dists;
    vc.items = [vcItem];
    DB.vcs.unshift(vc);
    closeM(); render(); toast(`VC confirmado — ${dists.length} quiebre(s) · ${tot} ${VC_S.unidad} ✓`);
  } catch(e) { toast('Error creando VC: '+e.message,'r'); }
}

  const o = DB.obras.find(x=>x.id===OID);
  showM(`↑ Importar Excel — ${o?.id}`,`

      <input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="onFileImport(this)"/>
      <div style="font-size:28px;margin-bottom:8px">📊</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">Arrastrá el Excel o hacé click</div>
      <div style="font-size:11px;color:var(--chalk3)">Columnas: Nat · Código · Descripción · Unidad · CantObj</div>
    </div>

  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)procesarImport(f);});

function onFileImport(inp){const f=inp.files[0];if(f)procesarImport(f);}
function procesarImport(file) {
  $('import-status').innerHTML=`<div class="import-prog">
    <div style="font-size:11px;font-family:var(--fm);margin-bottom:6px">Procesando: ${file.name}</div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog" style="width:0%"></div></div>
    <div style="font-size:10px;color:var(--chalk3);font-family:var(--fm)" id="prog-txt">Leyendo archivo...</div>
  </div>`;
  let pct=0;
  const interval=setInterval(()=>{
    pct=Math.min(pct+15,85);
    const pb=$('prog'),pt=$('prog-txt');
    if(pb)pb.style.width=pct+'%';
    if(pt)pt.textContent=pct<30?'Leyendo...':pct<60?'Detectando quiebres...':pct<80?'Importando materiales...':'Casi listo...';
  },200);
  setTimeout(()=>{clearInterval(interval);importarExcelObra(file,OID);},1200);
}

async function importarExcelObra(file, obraId) {
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb = XLSX.read(ev.target.result,{type:'binary'});
      const sheetName = wb.SheetNames.find(s=>s.toLowerCase().includes('quiebre'))||wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const quiebres=[]; let quiebreActual=null; let importados=0; let mats_importados=0;
      for(let i=3;i<Math.min(rows.length,500);i++){
        const row=rows[i]; if(!row||row.every(c=>!c))continue;
        const nat=row[0],cod=row[2],desc=row[3],unid=row[4],canObj=row[5];
        if(nat&&!cod){
          quiebreActual={id:'q_'+Date.now()+'_'+i,obra_id:obraId,codigo:String(nat).trim(),nivel:1,descripcion:String(desc||'').trim(),unidad:String(unid||'').trim(),cant_objetivo:parseFloat(canObj)||0,cant_ejecutada:0,comentario:'',dias_sin_movimiento:0};
          quiebres.push(quiebreActual); importados++;
        } else if(cod&&desc&&!String(cod).trim().toUpperCase().includes('CODIGO')){
          const codStr=String(cod).trim(); const parts=codStr.split('.');
          if(parts.length>=2){
            quiebreActual={id:'q_'+Date.now()+'_'+i,obra_id:obraId,codigo:codStr,nivel:parts.length,descripcion:String(desc).trim(),unidad:String(unid||'').trim(),cant_objetivo:parseFloat(canObj)||0,cant_ejecutada:0,comentario:'',dias_sin_movimiento:0};
            quiebres.push(quiebreActual); importados++;
          } else if(quiebreActual&&codStr.toUpperCase().startsWith('MO')){
            if(!quiebreActual._mats)quiebreActual._mats=[];
            quiebreActual._mats.push({codigo:codStr,descripcion:String(desc).trim(),unidad:String(unid||'u').trim(),cant_objetivo:parseFloat(canObj)||0});
            mats_importados++;
          }
        }
      }
      if(!quiebres.length){toast('No se detectaron quiebres — verificá el formato','r');return;}
      // Guardar en BD
      setSync('Guardando en BD...');
      for(const q of quiebres){
        const mats=q._mats||[]; delete q._mats;
        try {
          await api('/quiebres',{method:'POST',body:q,return:'minimal'});
        } catch(e){ /* ya existe */ }
        for(const m of mats){
          try { await api('/materiales',{method:'POST',body:{...m,id:'mat_'+Date.now()+'_'+Math.random().toString(36).slice(2),quiebre_id:q.id},return:'minimal'}); } catch(e){}
        }
        q.can_obj=q.cant_objetivo; q.can_ejec=0; q.dias_sin_mov=0; q.desc=q.descripcion; q.materiales=q._mats||[]; q.extras=[];
      }
      DB.quiebres[obraId]=quiebres;
      closeM(); setSync('✓ Sincronizado'); TAB='quiebres'; render();
      toast(`✓ ${importados} quiebres y ${mats_importados} materiales importados`);
    } catch(e){toast('Error al leer: '+e.message,'r');console.error(e);}
  };
  reader.readAsBinaryString(file);
}
